name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pwsh-tests:
    name: PowerShell tests
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Pester and PSScriptAnalyzer
        run: |
          pwsh -Command "Install-Module Pester -MinimumVersion 5.7.0 -Force -Scope CurrentUser"
          pwsh -Command "Install-Module PSScriptAnalyzer -Force -Scope CurrentUser"

      - name: Run PowerShell test suite with plain text rendering
        shell: pwsh
        env:
          TERM: dumb
          NO_COLOR: "1"
        run: |
          $PSStyle.OutputRendering = 'PlainText'
          ./tests/run-tests.ps1

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: tests/pwsh/results/pester-results.xml
          if-no-files-found: warn
          retention-days: 7
